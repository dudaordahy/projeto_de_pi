<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    
    <form action="./actions/cadastro.php" method="post">
        <h1>Cadastro</h1>
        <div class="input-box">
            <input type="text" placeholder="Usuário" name="user" required>
            <img src="./assets/img/usu.novo.jfif" class="usuario">
        </div>

        <div class="input-box">
            <input id="login-senha" name="email" type="password" placeholder="Senha" required>
            <img src="./assets/img/visivel.png" class="usuario" data-target="login-senha">
        </div>

        <div class="input-box">
            <input id="login-senha" name="senha" type="password" placeholder="Senha" required minlength="6" maxlength="10" required>
            <img src="./assets/img/visivel.png" class="usuario" data-target="login-senha">
        </div>

        <button type="submit" class="btn">Login</button>
    
    </form>


</body>
</html>
